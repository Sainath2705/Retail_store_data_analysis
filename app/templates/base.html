<!DOCTYPE html>
<html>
<head>
    <title>Retail Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        body.dark-mode .card {
            background-color: #1e1e1e;
            color: #ffffff;
        }

        body.dark-mode .navbar {
            background-color: #1f1f1f !important;
        }

        body.dark-mode .navbar-brand {
            color: #ffffff !important;
        }

        body.dark-mode .text-muted {
            color: #cccccc !important;
        }
    </style>
</head>

<body>

<nav id="mainNavbar" class="navbar navbar-light bg-light shadow-sm px-4">
    <span class="navbar-brand fw-bold">Retail Dashboard</span>

    <div class="d-flex gap-2">
        <button id="themeBtn" onclick="toggleDarkMode()" class="btn btn-outline-dark btn-sm">
            🌙 Dark Mode
        </button>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script>
function toggleDarkMode() {
    const body = document.body;
    const btn = document.getElementById("themeBtn");
    const navbar = document.getElementById("mainNavbar");

    body.classList.toggle("dark-mode");

    if (body.classList.contains("dark-mode")) {
        btn.innerHTML = "☀ Light Mode";
        btn.classList.remove("btn-outline-dark");
        btn.classList.add("btn-outline-light");

        navbar.classList.remove("navbar-light", "bg-light");
        navbar.classList.add("navbar-dark", "bg-dark");
    } else {
        btn.innerHTML = "🌙 Dark Mode";
        btn.classList.remove("btn-outline-light");
        btn.classList.add("btn-outline-dark");

        navbar.classList.remove("navbar-dark", "bg-dark");
        navbar.classList.add("navbar-light", "bg-light");
    }
}
</script>

</body>
</html>
