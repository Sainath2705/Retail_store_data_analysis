{% extends "base.html" %}

{% block content %}

<h2>Upload Sales Data</h2>

<div class="card p-4 mt-3">
    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <input type="file" name="file" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">
            Upload File
        </button>
    </form>
</div>

{% endblock %}
